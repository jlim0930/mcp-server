services:
  mcp-docs-server:
    build: .
    container_name: mcp-docs-app
    ports:
      - "8888:8000"
    environment:
      # Pass your comma-separated list of documentation sites here
      - DOC_SITES=https://docs.example.com,https://api.example.com
      # Control the throttling between requests in seconds (default: 1.0)
      - CRAWL_DELAY=1.0
      # How often the server should automatically re-crawl in hours (default: 168.0)
      - REFRESH_INTERVAL_HOURS=168.0
    volumes:
      # This maps a local folder to the container's DB path for persistent indexing
      - ./mcp_data:/app/chroma_db
    command: ["sse"]
    restart: unless-stopped
    # Required for Crawl4AI to have enough shared memory for the headless browser
    shm_size: '2gb'
